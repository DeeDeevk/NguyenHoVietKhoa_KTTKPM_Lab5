services:
  db:
    image: postgres:15-alpine
    container_name: postgres_server
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: adminer_web
    restart: always
    ports:
      - "8083:8080"
    depends_on:
      - db

volumes:
  postgres_data: