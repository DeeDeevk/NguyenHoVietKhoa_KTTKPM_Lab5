services:
  db:
    image: mysql:8.0
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"  # Đổi thành 3307 để tránh xung đột nếu máy bạn đã có MySQL
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: