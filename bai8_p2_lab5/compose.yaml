services:
  db:
    image: mysql:8.0
    container_name: mysql_db_bai8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

  app:
    build: .
    container_name: node_app_bai8
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
    depends_on:
      - db